<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Kendali Keuangan - Super Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 p-8 font-sans antialiased text-slate-800">

    <div class="max-w-7xl mx-auto">
        <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Pusat Kendali Keuangan (Super Admin)</h1>
        <p class="text-slate-500 mb-8">Pantau total omzet seluruh Tenant dan kelola antrean transfer pencairan dana.</p>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-blue-600 mb-4"><i class="fa-solid fa-users"></i> Saldo Seluruh Tenant</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 uppercase text-[10px]">
                            <tr>
                                <th class="p-3">Nama Toko</th>
                                <th class="p-3">Saldo Mengendap</th>
                                <th class="p-3">Total Omzet</th>
                            </tr>
                        </thead>
                        <tbody id="tenantBalances">
                            <tr><td colspan="3" class="p-4 text-center">Memuat data dari Server...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold text-amber-500 mb-4"><i class="fa-solid fa-money-bill-transfer"></i> Antrean Transfer Pencairan</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 uppercase text-[10px]">
                            <tr>
                                <th class="p-3">Toko & Rekening</th>
                                <th class="p-3">Nominal</th>
                                <th class="p-3">Aksi Transfer</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawalQueue">
                            <tr><td colspan="3" class="p-4 text-center">Memuat antrean...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Simulasi Token Super Admin (Anda harus mengatur login Super Admin)
        const token = "TOKEN_SUPER_ADMIN_ANDA_DISINI"; 
        const BASE_URL = 'https://rust-vjn7.onrender.com';

        function formatRp(num) { return "Rp " + Number(num).toLocaleString('id-ID'); }

        async function loadSuperAdminData() {
            try {
                // 1. Tarik Data Saldo Tenant
                const resBal = await fetch(`${BASE_URL}/api/super/balances`, { headers: { 'Authorization': `Bearer ${token}` } });
                const balances = await resBal.json();
                
                const balHtml = balances.map(b => `
                    <tr class="border-b">
                        <td class="p-3"><b>${b.nama_toko}</b><br><span class="text-[10px] text-gray-500">${b.nama_pemilik} (${b.no_wa})</span></td>
                        <td class="p-3 font-bold text-emerald-600">${formatRp(b.saldo_tersedia)}</td>
                        <td class="p-3 text-gray-400">${formatRp(b.total_masuk)}</td>
                    </tr>
                `).join('');
                document.getElementById('tenantBalances').innerHTML = balHtml;

                // 2. Tarik Antrean Penarikan
                const resWd = await fetch(`${BASE_URL}/api/super/withdrawals`, { headers: { 'Authorization': `Bearer ${token}` } });
                const withdraws = await resWd.json();

                const wdHtml = withdraws.map(w => `
                    <tr class="border-b">
                        <td class="p-3"><b>${w.nama_toko}</b><br><span class="text-xs text-blue-600">${w.bank} - ${w.rekening}</span><br><span class="text-[10px] uppercase font-bold text-gray-500">A/N: ${w.atas_nama}</span></td>
                        <td class="p-3 font-bold text-amber-600">${formatRp(w.nominal)}<br>
                            <span class="text-[10px] bg-${w.status === 'Pending' ? 'amber' : 'emerald'}-100 text-${w.status === 'Pending' ? 'amber' : 'emerald'}-600 px-2 rounded">${w.status}</span>
                        </td>
                        <td class="p-3">
                            ${w.status === 'Pending' ? `<button onclick="approveTransfer('${w.id}')" class="bg-emerald-500 hover:bg-emerald-600 text-white px-3 py-2 rounded text-xs font-bold shadow">Ubah ke Selesai</button>` : `<span class="text-xs text-gray-400">Telah Ditransfer</span>`}
                        </td>
                    </tr>
                `).join('');
                document.getElementById('withdrawalQueue').innerHTML = wdHtml;

            } catch(e) { console.error(e); }
        }

        async function approveTransfer(id) {
            if(!confirm("Apakah Anda yakin SUDAH men-transfer uang ini ke rekening tenant tersebut?")) return;
            
            try {
                const res = await fetch(`${BASE_URL}/api/super/withdrawals/${id}/approve`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }
                });
                if(res.ok) {
                    alert("Sukses! Status penarikan berubah menjadi Selesai.");
                    loadSuperAdminData(); // Refresh Tabel
                }
            } catch(e) { alert("Gagal memproses."); }
        }

        window.onload = loadSuperAdminData;
    </script>
</body>
</html>
